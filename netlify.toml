[build]
  # Ensure Netlify installs client dependencies (including the Vite CLI)
  # then runs the client build inside the `client` folder.
  command = "cd client && npm ci && npm run build"
  publish = "client/dist"

[build.environment]
  NPM_CONFIG_PRODUCTION = "false"

# Ensure hashed assets are cached, but index.html always re-fetches
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache"

